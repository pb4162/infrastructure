- name: "Install borg and borgmatic for OpenBSD"
  community.general.openbsd_pkg:
    name:
      - borgbackup
      - borgmatic
    state: present
  when: ansible_distribution | lower == "openbsd"

- name: "Install borg and borgmatic for Debian"
  ansible.builtin.apt:
    name:
      - borgbackup
      - borgmatic
    state: present
  when: ansible_distribution | lower == "debian"

- name: "Create /etc/borgmatic directory"
  ansible.builtin.file:
    path: /etc/borgmatic
    state: directory

- name: Register this host with the backup server if using one
  when: borg_server_host is not none
  block:
    - name: Generate OpenSSH key for use with backup server
      community.crypto.openssh_keypair:
        path: "~/.ssh/id_rsa"
      register: openssh_keypair

    - name: Upload the public key to the backup server
      ansible.posix.authorized_key:
        key: "{{ openssh_keypair.public_key }}"
        key_options: 'command="cd {{ ("~/repos", inventory_hostname) | path_join }};borg serve --restrict-to-path {{ ("~/repos", inventory_hostname) | path_join }}",restrict'
        user: "{{ borg_server_user }}"
      delegate_to: "{{ borg_server_host | default('null') }}"

- name: "Merge borgmatic_(config,config_base,config_private) into final config"
  ansible.builtin.set_fact:
    borgmatic_config_final: "{{ borgmatic_config_base | combine(borgmatic_config, borgmatic_config_private, recursive=true, list_merge='append') }}"

- name: "Copy final config to /etc/borgmatic/config.yaml"
  ansible.builtin.copy:
    backup: true
    content: "{{ borgmatic_config_final | to_nice_yaml }}"
    dest: /etc/borgmatic/config.yaml
    mode: 0660
    validate: borgmatic --config %s config validate

- name: "Create borg repo"
  ansible.builtin.shell: >-
    BORG_PASSPHRASE={{ borgmatic_config_final.encryption_passphrase | quote }}
    borgmatic -v 1 repo-create --encryption repokey
  register: create_repo_info
  changed_when: ("Repository already exists" not in create_repo_info.stdout)

# TODO: export repo key

- name: "Add cronjob for borgmatic on OpenBSD"
  ansible.builtin.cron:
    minute: "0"
    hour: "0"
    name: borgmatic
    user: root
    job: >-
      PATH=$PATH:/usr/bin:/usr/local/bin
      borgmatic
      --verbosity -1
      --syslog-verbosity 1
  when: ansible_distribution | lower == "openbsd"

- name: "Enable borgmatic.timer on Debian"
  ansible.builtin.systemd_service:
    name: borgmatic.timer
    state: started
    enabled: true
  when: ansible_distribution | lower == "debian"
