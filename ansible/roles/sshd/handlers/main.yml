- name: "Restart sshd (freebsd)"
  ansible.builtin.service:
    name: sshd
    state: restarted

- name: "Restart sshd (openbsd)"
  ansible.builtin.service:
    name: sshd
    state: restarted

- name: "Restart sshd (debian)"
  ansible.builtin.systemd_service:
    name: sshd.service
    state: restarted
