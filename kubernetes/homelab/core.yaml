---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: core-secrets
  namespace: flux-system
spec:
  interval: 5m
  path: "./kubernetes/homelab/core"
  prune: true
  sourceRef:
    kind: GitRepository
    name: secrets
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: core
  namespace: flux-system
spec:
  dependsOn:
    - name: core-secets
  interval: 5m
  path: "./core"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system

