---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-secrets
  namespace: flux-system
spec:
  interval: 5m
  path: "./kubernetes/clusters/homelab/apps"
  prune: true
  sourceRef:
    kind: GitRepository
    name: secrets
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  dependsOn:
    - name: apps-secrets
    - name: core
  interval: 5m
  path: "./kubernetes/apps"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
