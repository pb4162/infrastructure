apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- gotk-components.yaml
- gotk-sync.yaml
patches:
  - patch: |
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: all
      spec:
        interval: 10m
        timeout: 5m
        driftDetection:
          mode: enabled
    target:
      kind: HelmRelease
  - patch: |
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRepository
      metadata:
        name: all
      spec:
        interval: 5m
    target:
      kind: HelmRepository
