---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: private-secrets
  namespace: flux-system
spec:
  interval: 5m
  path: "./kubernetes/clusters/homelab/private"
  prune: true
  sourceRef:
    kind: GitRepository
    name: secrets
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: private
  namespace: flux-system
spec:
  dependsOn:
    - name: private-secrets
    - name: core
  interval: 5m
  path: "./kubernetes/private"
  prune: true
  sourceRef:
    kind: GitRepository
    name: private
