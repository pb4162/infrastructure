apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: helmrelease-common
  namespace: flux-system
spec:
  patches:
    - patch: |
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: all
        spec:
          interval: 10m
          timeout: 5m
          driftDetection:
            mode: enabled
      target:
        kind: HelmRelease
