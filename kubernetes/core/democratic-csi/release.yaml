---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: snapshot-controller
  namespace: democratic-csi
spec:
  chart:
    spec:
      chart: snapshot-controller
      version: 0.3.0
      sourceRef:
        kind: HelmRepository
        name: democratic-csi
      interval: 5m
  releaseName: snapshot-controller
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: democratic-csi-truenas-smb
  namespace: democratic-csi
spec:
  chart:
    spec:
      chart: democratic-csi
      version: 0.15.1
      sourceRef:
        kind: HelmRepository
        name: democratic-csi
      interval: 5m
  releaseName: democratic-csi-truenas-smb
  valuesFrom:
    - kind: Secret
      name: democratic-csi-values
  values:
    controller:
      driver:
        image:
          tag: next
    node:
      driver:
        image:
          tag: next

    csiDriver:
      name: "org.democratic-csi.smb"
      fsGroupPolicy: File

    volumeSnapshotClasses:
      - name: "truenas-smb"
        labels:
          velero.io/csi-volumesnapshot-class: "true"
        parameters:
        secrets:
          snapshotter-secret:
      - name: "truenas-smb-nextcloud"
        labels:
          velero.io/csi-volumesnapshot-class: "true"
        parameters:
        secrets:
          snapshotter-secret:
      - name: "truenas-smb-nextcloud-talk-recording"
        labels:
          velero.io/csi-volumesnapshot-class: "true"
        parameters:
        secrets:
          snapshotter-secret:

    driver:
      config:
        driver: freenas-api-smb
        instance_id:
        httpConnection:
          protocol: https
          port: 8443
          allowInsecure: true
        zfs:
          datasetParentName: tank/data/smb/volumes
          detachedSnapshotsDatasetParentName: tank/data/smb/snapshots
          datasetEnableQuotas: true
          datasetEnableReservation: false
          datasetPermissionsMode: "0777"
        smb:
          nameTemplate: "{{ parameters.[csi.storage.k8s.io/pvc/name] }}"
          namePrefix: ""
          nameSuffix: ""
          shareHome: false
          shareAllowedHosts: []
          shareDeniedHosts: []
          shareGuestOk: true
          shareRecycleBin: true
          shareBrowsable: false
          shareAccessBasedEnumeration: true
          shareTimeMachine: false
