apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb-helm
  namespace: flux-system
spec:
  interval: 5m
  path: "./kubernetes/core/metallb/helm"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  patches:
    - patch: |
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: all
        spec:
          interval: 10m
          timeout: 5m
          driftDetection:
            mode: enabled
            ignore:
            - paths: ["/spec/replicas"]
              target:
                kind: Deployment
            - paths:
              - /spec/conversion/webhook/clientConfig/caBundle
              target:
                kind: CustomResourceDefinition
      target:
        kind: HelmRelease
    - patch: |
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRepository
        metadata:
          name: all
        spec:
          interval: 5m
      target:
        kind: HelmRepository
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb-post
  namespace: flux-system
spec:
  dependsOn:
    - name: metallb-helm
  interval: 5m
  path: "./kubernetes/core/metallb/post"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
