apiVersion: v1
kind: ConfigMap
metadata:
  name: cnpg-default-values
  namespace: cnpg-system
data:
  values.yaml: |
    cluster:
      instances: 1
      monitoring:
        enabled: true
        prometheusRule:
          enabled: true
      additionalLabels:
        release: kube-prometheus-stack
      superuserSecret: cnpg-superuser-secret
    backups:
      enabled: true
      s3:
        bucket: cnpg
      wal:
        encryption: ""
      dats:
        encryption: ""
