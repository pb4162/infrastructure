apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg
  namespace: cnpg-system
spec:
  chart:
    spec:
      chart: cloudnative-pg
      version: 0.25.0
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: cnpg-system
      interval: 5m
  releaseName: cnpg
  upgrade:
    crds: CreateReplace
  values:
    config:
      secret: true
    monitoring:
      grafanaDashboard:
        create: true
