apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-smb
  namespace: kube-system
spec:
  chart:
    spec:
      chart: csi-driver-smb
      version: 1.20.0
      sourceRef:
        kind: HelmRepository
        name: csi-driver-smb
      interval: 5m
  releaseName: csi-driver-smb
  values:
    controller:
      resources:
        csiProvisioner:
          limits:
            memory: 100Mi
        csiResizer:
          limits:
            memory: 100Mi
        livenessProbe:
          limits:
            memory: 50Mi
        smb:
          limits:
            memory: 100Mi
    linux:
      resources:
        livenessProbe:
          limits:
            memory: 50Mi
        nodeDriverRegistrar:
          limits:
            memory: 50Mi
        smb:
          limits:
            memory: 100Mi
