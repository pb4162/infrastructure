apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  chart:
    spec:
      chart: longhorn
      version: 1.12.0
      sourceRef:
        kind: HelmRepository
        name: longhorn
      interval: 5m
  releaseName: longhorn
  valuesFrom:
    - kind: Secret
      name: longhorn-values
  values:
    csi:
      attacherReplicaCount: 2
      provisionerReplicaCount: 2
      resizerReplicaCount: 2
      snapshotterReplicaCount: 2
    defaultBackupStore:
      backupTargetCredentialSecret: s3-secret
    defaultSettings:
      defaultDataLocality: best-effort
      replicaAutoBalance: least-effort
      defaultReplicaCount: 2
      autoDeletePodWhenVolumeDetachedUnexpectedly: true
      nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
      guaranteedInstanceManagerCPU: 12
      autoCleanupSystemGeneratedSnapshot: true
      autoCleanupRecurringJobBackupSnapshot: true
      autoCleanupSnapshotWhenDeleteBackup: true
      autoCleanupSnapshotAfterOnDemandBackupCompleted: true
      snapshotHeavyTaskConcurrentLimit: 2
    persistence:
      defaultClassReplicaCount: 2
      reclaimPolicy: Retain
      migratable: true
      defaultDiskSelector:
        enable: true
        selector: ssd
    ingress:
      enabled: true
      host: longhorn.${LOCAL_ROOT_DOMAIN}
      extraHosts:
        - longhorn.${ROOT_DOMAIN}
      annotations:
        traefik.ingress.kubernetes.io/router.middlewares: authentik-authentik@kubernetescrd
    metrics:
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack
