apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-feature-discovery
  namespace: node-feature-discovery
spec:
  chart:
    spec:
      chart: node-feature-discovery
      version: 0.18.0
      sourceRef:
        kind: HelmRepository
        name: nfd
      interval: 5m
  releaseName: node-feature-discovery
  values:
    master:
      resources:
        limits: 
          memory: 512Mi
    worker:
      resources:
        limits:
          memory: 128Mi
    gc:
      resources:
        limits:
          memory: 128Mi
