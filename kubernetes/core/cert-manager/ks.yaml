---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-helm
  namespace: flux-system
spec:
  interval: 5m
  path: "./kubernetes/core/cert-manager/helm"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-post
  namespace: flux-system
spec:
  dependsOn:
    - name: cert-manager-helm
  interval: 5m
  path: "./kubernetes/core/cert-manager/post"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
