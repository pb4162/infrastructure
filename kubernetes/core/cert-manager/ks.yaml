---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-helm
  namespace: flux-system
spec:
  interval: 5m
  path: "./kubernetes/core/cert-manager/helm"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  patches:
    - patch: |
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: all
        spec:
          interval: 10m
          timeout: 5m
          driftDetection:
            mode: enabled
      target:
        kind: HelmRelease
    - patch: |
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRepository
        metadata:
          name: all
        spec:
          interval: 5m
      target:
        kind: HelmRepository
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-post
  namespace: flux-system
spec:
  dependsOn:
    - name: cert-manager-helm
  interval: 5m
  path: "./kubernetes/core/cert-manager/post"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
