apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  chart:
    spec:
      chart: cert-manager
      version: v1.20.1
      sourceRef:
        kind: HelmRepository
        name: jetstack
      interval: 5m
  releaseName: cert-manager
  values:
    resources:
      limits:
        memory: 64Mi
    webhook:
      resources:
        limits:
          memory: 64Mi
    cainjector:
      resources:
        limits:
          memory: 128Mi
    startupapicheck:
      resources:
        limits:
          memory: 32Mi
    prometheus:
      servicemonitor:
        enabled: true
        labels:
          release: kube-prometheus-stack
    crds:
      enabled: true
