apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-technitium
  namespace: external-dns
spec:
  chart:
    spec:
      chart: external-dns
      version: 1.21.1
      sourceRef:
        kind: HelmRepository
        name: external-dns
      interval: 5m
  releaseName: external-dns-technitium
  valuesFrom:
    - kind: Secret
      name: technitium-values
  values:
    provider:
      name: rfc2136
    triggerLoopOnEvent: true
    txtOwnerId: external-dns
    sources:
      - service
      - ingress
    policy: sync
    logLevel: info
    interval: 1m
    rbac:
      create: true
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
