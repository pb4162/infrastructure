apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  chart:
    spec:
      chart: traefik
      version: 39.0.6
      sourceRef:
        kind: HelmRepository
        name: traefik
      interval: 5m
  releaseName: traefik
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  values:
    priorityClassName: "system-cluster-critical"  # inherited from k3s HelmChart
    deployment:
      replicas: 2
    metrics:
      addInternals: true
      prometheus:
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: kube-prometheus-stack
        prometheusRule:
          enabled: true
          rules:
            - alert: TraefikDown
              expr: up{job="traefik"} == 0
              for: 5m
              labels:
                context: traefik
                severity: warning
              annotations:
                summary: "Traefik Down"
                description: "{{ $labels.pod }} on {{ $labels.nodename }} is down"
          additionalLabels:
            release: kube-prometheus-stack
    providers:
      kubernetesCRD:
        allowCrossNamespace: true
        allowExternalNameServices: true
      kubernetesIngress:
        publishedService:
          enabled: true
        allowExternalNameServices: true
    service:
      ipFamilyPolicy: "PreferDualStack"
      spec:
        loadBalancerIP: "${TRAEFIK_IP}"
        externalTrafficPolicy: Local
    ports:
      web:
        port: 80
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
        proxyProtocol:
          trustedIPs:
            - 10.42.0.0/16
            - 10.43.0.0/16
      websecure:
        port: 443
        forwardedHeaders:
          trustedIPs:
            - "${PROXY_VPS_TAILSCALE_IP}"
            - "${PROXY_VPS_IP}"
        http:
          middlewares:
            - crowdsec-bouncer@kubernetescrd
        proxyProtocol:
          trustedIPs:
            - 10.42.0.0/16
            - 10.43.0.0/16
    tlsStore:
      default:
        defaultCertificate:
          secretName: pb4162-dev-tls
    global:
      sendAnonymousUsage: false
    additionalArguments:
      - "--api.insecure=true"
    logs:
      access:
        enabled: true
        format: common
        fields:
          headers: 
            defaultmode: keep
    experimental:
      plugins:
        bouncer:
          moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
          version: "v1.3.5"
