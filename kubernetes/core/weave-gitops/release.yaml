apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: ww-gitops
  namespace: flux-system
spec:
  chart:
    spec:
      chart: weave-gitops
      version: 4.0.36
      sourceRef:
        kind: HelmRepository
        name: ww-gitops
      interval: 5m
  releaseName: ww-gitops
  valuesFrom:
    - kind: Secret
      name: ww-gitops-values
  values:
    adminUser:
      create: true
      username: admin
    rbac:
      impersonationResourceNames:
        - admin
    ingress:
      enabled: true
      hosts:
        - host: flux.${ROOT_DOMAIN}
          paths:
            - path: /
              pathType: ImplementationSpecific
        - host: flux.${LOCAL_ROOT_DOMAIN}
          paths:
            - path: /
              pathType: ImplementationSpecific
