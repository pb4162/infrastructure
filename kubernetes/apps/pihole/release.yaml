apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pihole
  namespace: pihole
spec:
  chart:
    spec:
      chart: pihole
      version: 2.29.1
      sourceRef:
        kind: HelmRepository
        name: mojo2600
      interval: 5m
  releaseName: pihole
  valuesFrom:
    - kind: Secret
      name: pihole-values
  values:
    resources:
      limits:
        memory: 128Mi
    replicaCount: 2
    serviceDns:
      mixedService: true
      type: LoadBalancer
    serviceWeb:
      annotations:
        traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
    virtualHost: pihole.${LOCAL_ROOT_DOMAIN}
    ingress:
      enabled: true
      annotations:
        traefik.ingress.kubernetes.io/router.middlewares: pihole-pb4162-dev-redirect@kubernetescrd
      hosts:
        - pihole.${LOCAL_ROOT_DOMAIN}
        - pihole.${ROOT_DOMAIN}
    persistentVolumeClaim:
      enabled: true
      accessModes:
        - ReadWriteMany
    antiaff:
      enabled: true
    extraEnvVars:
      FTLCONF_dns_listeningMode: all
