apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 5m
  releaseName: vaultwarden
  values:
    controllers:
      main:
        enabled: true
        containers:
          main:
            image:
              repository: vaultwarden/server
              tag: 1.36.0
            env:
              DOMAIN: https://vaultwarden.${ROOT_DOMAIN}
              SIGNUPS_ALLOWED: false
              SIGNUPS_VERIFY: true
              PUSH_ENABLED: true
              SHOW_PASSWORD_HINT: false
            envFrom:
              - secretRef:
                  name: vaultwarden-secret
          backup:
            image:
              repository: ttionya/vaultwarden-backup
              tag: 1.26.6
            env:
              BACKUP_KEEP_DAYS: 30
              CRON: "0 0 * * *"
            envFrom:
              - secretRef:
                  name: vaultwarden-backup-secret
    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            enabled: true
            port: 80
    ingress:
      main:
        enabled: true
        hosts:
          - host: vaultwarden.${LOCAL_ROOT_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  name: vaultwarden
                  port: 80
          - host: vaultwarden.${ROOT_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  name: vaultwarden
                  port: 80
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 15Gi
        advancedMounts:
          main:
            main:
              - path: /data/
                readOnly: false
            backup:
              - path: /bitwarden/data/
                readOnly: false
      backup-rclone-config:
        enabled: true
        type: secret
        name: vaultwarden-backup-rclone-config
        advancedMounts:
          main:
            backup:
              - path: /config/rclone
                readOnly: true
