apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  chart:
    spec:
      chart: vaultwarden
      version: 0.34.3
      sourceRef:
        kind: HelmRepository
        name: vaultwarden
      interval: 5m
  releaseName: vaultwarden
  values:
    adminToken:
      existingSecret: vaultwarden-admin-token
      existingSecretKey: ADMIN_TOKEN
    signupsAllowed: false
    resources:
      limits:
        memory: 256Mi
    storage:
      data:
        name: "vaultwarden-data"
        size: "15Gi"
        path: "/data"
        accessMode: "ReadWriteOnce"
    domain: https://vaultwarden.${ROOT_DOMAIN}
    ingress:
      enabled: true
      class: "traefik"
      nginxIngressAnnotations: false
      hostname: vaultwarden.${ROOT_DOMAIN}
      additionalHostnames: 
        - vaultwarden.${LOCAL_ROOT_DOMAIN}
