apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: it-tools
  namespace: it-tools
spec:
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 5m
  releaseName: it-tools
  values:
    controllers:
      main:
        enabled: true
        containers:
          main:
            image:
              repository: ghcr.io/corentinth/it-tools
              tag: 2024.10.22-7ca5933
    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            enabled: true
            port: 80
    ingress:
      main:
        enabled: true
        hosts:
          - host: it-tools.${LOCAL_ROOT_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  name: it-tools
                  port: 80
          - host: it-tools.${ROOT_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  name: it-tools
                  port: 80
