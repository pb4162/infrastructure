apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  chart:
    spec:
      chart: immich
      version: 0.10.0
      sourceRef:
        kind: HelmRepository
        name: immich
      interval: 5m
  releaseName: immich
  valuesFrom:
    - kind: Secret
      name: immich-values
  values:
    controllers:
      main:
        containers:
          main:
            env:
              DB_HOSTNAME: cnpg-immich-cluster-rw.immich.svc.cluster.local:5432
              DB_USERNAME: immich
              DB_DATABASE_NAME: immich
    immich:
      persistence:
        # TODO: remove? since using external libraries anyway
        library:
          existingClaim: immich-library
        nextcloud:
          existingClaim: nextcloud
    valkey:
      enabled: true
      persistence:
        data:
          enabled: true
          size: 1Gi
          type: persistentVolumeClaim
          storageClass: longhorn
    server:
      enabled: true
      ingress:
        main:
          enabled: true
          hosts:
            - host: immich.${LOCAL_ROOT_DOMAIN}
              paths:
                - path: "/"
                  service:
                    identifier: main
            - host: immich.${ROOT_DOMAIN}
              paths:
                - path: "/"
                  service:
                    identifier: main
    machine-learning:
      enabled: true
      persistence:
        cache:
          enabled: true
          size: 10Gi
          type: persistentVolumeClaim
          storageClass: longhorn
