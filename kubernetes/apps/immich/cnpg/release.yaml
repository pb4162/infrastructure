apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg-immich
  namespace: immich
spec:
  chart:
    spec:
      chart: cluster
      version: 0.6.0
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: cnpg-system
      interval: 5m
  releaseName: cnpg-immich
  valuesFrom:
    - kind: ConfigMap
      name: cnpg-default-values
    - kind: Secret
      name: cnpg-backup-values
  values:
    version:
      postgresql: "16"
    cluster:
      # TODO: renovate
      imageName: ghcr.io/tensorchord/cloudnative-vectorchord:16.9-0.4.3
      initdb:
        postInitApplicationSQL:
          # Commands based on: https://immich.app/docs/administration/postgres-standalone/#without-superuser-permission
          - CREATE EXTENSION vchord CASCADE;
          - CREATE EXTENSION earthdistance CASCADE;
        database: immich
        owner: immich
        secret:
          name: cnpg-immich-password
      storage:
        size: 5Gi
      walStorage:
        enabled: true
        size: 40Gi
      postgresql:
        shared_preload_libraries:
          - "vchord.so"
        parameters:
          max_wal_size: "20GB"
    backups:
      scheduledBackups:
        - name: daily-backup
          schedule: "0 0 0 * * *"
