apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goldilocks
  namespace: goldilocks
spec:
  chart:
    spec:
      chart: goldilocks
      version: 9.2.0
      sourceRef:
        kind: HelmRepository
        name: fairwinds-stable
        namespace: flux-system
      interval: 5m
  releaseName: goldilocks
  values:
    controller:
      rbac:
        enableArgoproj: false
    dashboard:
      ingress:
        enabled: true
        hosts:
          - host: goldilocks.${LOCAL_ROOT_DOMAIN}
            paths:
              - path: /
                type: ImplementationSpecific
          - host: goldilocks.${ROOT_DOMAIN}
            paths:
              - path: /
                type: ImplementationSpecific
