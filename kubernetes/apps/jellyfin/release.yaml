apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  chart:
    spec:
      chart: jellyfin
      version: 2.3.0
      sourceRef:
        kind: HelmRepository
        name: jellyfin
      interval: 5m
  releaseName: jellyfin
  values:
    image:
      repository: pbcr.local/pb/jellyfin
      tag: 10.11.0
    resources:
      limits:
        memory: 4Gi
        gpu.intel.com/i915: 1
    ingress:
      enabled: true
      hosts:
        - host: jellyfin.${LOCAL_ROOT_DOMAIN}
          paths:
            - path: /
              pathType: ImplementationSpecific
        - host: jellyfin.${ROOT_DOMAIN}
          paths:
            - path: /
              pathType: ImplementationSpecific
    jellyfin:
      env:
        - name: "DOTNET_USE_POLLING_FILE_WATCHER"
          value: "true"
    persistence:
      config:
        enabled: true
        size: 10Gi
      media:
        existingClaim: jellyfin
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        labels:
          release: kube-prometheus-stack
