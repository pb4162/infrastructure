apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-clusterrolebinding
subjects:
  - kind: User
    name: ${HEADLAMP_OIDC_EMAIL}
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: cluster-admin  # TODO: perhaps this is a little too permissive
  apiGroup: rbac.authorization.k8s.io
