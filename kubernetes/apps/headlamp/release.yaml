apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: kube-system
spec:
  chart:
    spec:
      chart: headlamp
      version: 0.31.1
      sourceRef:
        kind: HelmRepository
        name: headlamp
      interval: 5m
  releaseName: headlamp
  values:
    config:
      watchPlugins: true
    persistentVolumeClaim:
      enabled: true
      accessModes:
        - ReadWriteOnce
      size: 5Gi
    ingress:
      enabled: true
      hosts:
        - host: headlamp.cluster.local
          paths:
            - path: /
              type: Prefix
        - host: headlamp.pb4162.dev
          paths:
            - path: /
              type: Prefix
    pluginsManager:
      enabled: true
      configContent: |
        plugins:
          - name: headlamp_flux
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_flux
            version: 0.2.0
        installOptions:
          parallel: true
          maxConcurrent: 2
