apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: kube-system
spec:
  chart:
    spec:
      chart: headlamp
      version: 0.42.0
      sourceRef:
        kind: HelmRepository
        name: headlamp
      interval: 5m
  releaseName: headlamp
  values:
    config:
      oidc:
        secret:
          create: false
        externalSecret:
          enabled: true
          name: headlamp-oidc
      watchPlugins: true
      enableHelm: true
    persistentVolumeClaim:
      enabled: true
      storageClassName: longhorn
      accessModes:
        - ReadWriteOnce
      size: 5Gi
    podSecurityContext:
      fsGroup: 101
      fsGroupChangePolicy: "OnRootMismatch"
    ingress:
      enabled: true
      hosts:
        - host: headlamp.${LOCAL_ROOT_DOMAIN}
          paths:
            - path: /
              type: Prefix
        - host: headlamp.${ROOT_DOMAIN}
          paths:
            - path: /
              type: Prefix
    pluginsManager:
      enabled: true
      configContent: |
        plugins:
          - name: headlamp_flux
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_flux
            version: 0.6.0
        installOptions:
          parallel: true
          maxConcurrent: 2
