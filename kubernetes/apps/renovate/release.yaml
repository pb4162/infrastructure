apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate
  namespace: renovate
spec:
  chart:
    spec:
      chart: renovate
      version: 46.187.0
      sourceRef:
        kind: HelmRepository
        name: renovate
      interval: 5m
  releaseName: renovate
  valuesFrom:
    - kind: ConfigMap
      name: renovate-base-values
    - kind: Secret
      name: renovate-values
  # values:
    # env:
    #   LOG_LEVEL: debug
