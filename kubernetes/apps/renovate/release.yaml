apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate
  namespace: renovate
spec:
  chart:
    spec:
      chart: renovate
      version: 43.35.7
      sourceRef:
        kind: HelmRepository
        name: renovate
      interval: 5m
  releaseName: renovate
  valuesFrom:
    - kind: Secret
      name: renovate-values
  values:
    renovate:
      configIsSecret: true
    redis:
      enabled: true
    # env:
    #   LOG_LEVEL: debug
