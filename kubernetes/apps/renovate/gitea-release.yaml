apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate-gitea
  namespace: renovate
spec:
  chart:
    spec:
      chart: renovate
      version: 44.7.0
      sourceRef:
        kind: HelmRepository
        name: renovate
      interval: 5m
  releaseName: renovate
  valuesFrom:
    - kind: Secret
      name: renovate-base-values
    - kind: Secret
      name: renovate-gitea-values
