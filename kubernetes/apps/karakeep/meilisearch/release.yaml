apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: meilisearch
  namespace: karakeep
spec:
  chart:
    spec:
      chart: meilisearch
      version: 0.14.0
      sourceRef:
        kind: HelmRepository
        name: meilisearch
      interval: 5m
  releaseName: meilisearch
  values:
    environment:
      MEILI_NO_ANALYTICS: true
      MEILI_ENV: production
    auth:
      existingMasterKeySecret: karakeep-secret
    persistence:
      enabled: true
      size: 5Gi
