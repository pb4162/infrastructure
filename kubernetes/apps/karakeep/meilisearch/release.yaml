apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: meilisearch
  namespace: karakeep
spec:
  chart:
    spec:
      chart: app-template
      version: 4.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 5m
  releaseName: meilisearch
  values:
    controllers:
      main:
        enabled: true
        containers:
          main:
            image:
              repository: getmeili/meilisearch
              tag: latest
            env:
              MEILI_NO_ANALYTICS: true
              MEILI_MASTER_KEY:
                valueFrom:
                  secretKeyRef:
                    name: "karakeep-secret"
                    key: MEILI_MASTER_KEY
    service:
      main:
        enabled: true
        controller: main
        ports:
          tcp:
            enabled: true
            port: 7700
            protocol: TCP
    persistence:
      meilisearch:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 2Gi
        globalMounts:
          - path: /meili_data
            readOnly: false
