apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  chart:
    spec:
      chart: loki
      version: 6.30.1
      sourceRef:
        kind: HelmRepository
        name: grafana
      interval: 5m
  releaseName: loki
  valuesFrom:
    - kind: Secret
      name: loki-values
  values:
    deploymentMode: SingleBinary
    lokiCanary:
      resources:
        limits:
          memory: 64Mi
    gateway:
      resources:
        limits:
          memory: 32Mi
    singleBinary:
      replicas: 1
      resources:
        limits:
          memory: 1Gi
      extraEnv:
        - name: GOMEMLIMIT
          value: 800MiB
    loki:
      limits_config:
        retention_period: 120d
      compactor:
        retention_enabled: true
        delete_request_store: s3
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      storage:
        bucketNames:
          chunks: loki
          ruler: loki
          admin: loki
        s3:
          s3: "http://minio:loki@minio.minio.svc.cluster.local:9000"
          endpoint: "http://minio.minio.svc.cluster.local:9000"
          s3ForcePathStyle: true
          accessKeyId: loki
          insecure: true
      ingester:
        chunk_encoding: snappy
      tracing:
        enabled: true
      querier:
        max_concurrent: 2
    resultsCache:
      allocatedMemory: 128
      writebackSizeLimit: 10MB
    chunksCache:
      allocatedMemory: 128
      writebackSizeLimit: 10MB
    memberlist:
      service:
        publishNotReadyAddresses: true
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    ingester:
      replicas: 0
    querier:
      replicas: 0
    queryFrontend:
      replicas: 0
    queryScheduler:
      replicas: 0
    distributor:
      replicas: 0
    compactor:
      replicas: 0
    indexGateway:
      replicas: 0
    bloomCompactor:
      replicas: 0
    bloomGateway:
      replicas: 0 
