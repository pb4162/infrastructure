apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 82.14.1
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
      interval: 5m
  releaseName: kube-prometheus-stack
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  valuesFrom:
    - kind: Secret
      name: kube-prometheus-stack-values
  values:
    defaultRules:
      rules:
        kubeControllerManager: false
        kubeProxy: false
        kubeSchedulerAlerting: false
        kubeSchedulerRecording: false
    grafana: 
      resources:
        limits:
          memory: 256Mi
      ingress:
        enabled: true
        hosts:
          - grafana.${LOCAL_ROOT_DOMAIN}
          - grafana.${ROOT_DOMAIN}
      persistence:
        enabled: true
        storageClassName: longhorn
    alertmanager:
      config:
        route:
          group_by: ['namespace']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: 'null'
          routes:
          - receiver: 'null'
            matchers:
              - alertname = "Watchdog"
          - receiver: 'discord'
            continue: true
          - receiver: 'telegram'
      alertmanagerSpec:
          resources:
            limits:
              memory: 512Mi
          storage: 
            volumeClaimTemplate:
              spec:
                storageClassName: longhorn
                accessModes: ["ReadWriteOnce"]
                resources:
                    requests:
                      storage: 10Gi
    prometheusOperator:
      resources:
        limits:
          memory: 256Mi
    prometheus:
      ingress:
        enabled: true
        annotations:
          traefik.ingress.kubernetes.io/router.middlewares: monitoring-prometheus-basic-auth@kubernetescrd
          blackbox-exporter.pb4162.dev/auth: true
        hosts:
          - prometheus.${LOCAL_ROOT_DOMAIN}
          - prometheus.${ROOT_DOMAIN}
      prometheusSpec:
        scrapeInterval: "60s"
        maximumStartupDurationSeconds: 1200
        retentionSize: 250GB
        retention: 60d
        persistentVolumeClaimRetentionPolicy:
          whenDeleted: Retain
          whenScaled: Retain
        resources:
          limits:
            memory: 4Gi
            cpu: 400m
        additionalScrapeConfigs:
          - job_name: 'blackbox'
            scrape_interval: 30s
            kubernetes_sd_configs:
              - role: ingress
                # attach_metadata:
                #   namespace: true
            metrics_path: /probe
            params:
              module: [http_2xx]
            relabel_configs:
              # TODO: healthcheck for fluxcd webhook?
              - source_labels: [__address__]
                regex: flux-webhook.${ROOT_DOMAIN}
                action: drop
              - source_labels: [__meta_kubernetes_ingress_annotation_blackbox_exporter_pb4162_dev_auth]
                regex: "true"
                target_label: __param_module
                replacement: http_2xx_auth
              - source_labels: [__meta_kubernetes_ingress_path]
                target_label: __tmp_path
              - source_labels: [
                  __meta_kubernetes_ingress_annotation_blackbox_exporter_pb4162_dev_path
                  ]
                regex: (.+)
                target_label: __tmp_path
              - source_labels:
                  [
                    __meta_kubernetes_ingress_scheme,
                    __address__,
                    __tmp_path,
                  ]
                regex: (.+);(.+);(.+)
                replacement: $${1}://$${2}$${3}
                target_label: __param_target
              - target_label: __address__
                replacement: prometheus-blackbox-exporter.monitoring.svc.cluster.local:9115
              - source_labels: [__param_target]
                target_label: instance
          - job_name: 'blackbox_exporter'
            static_configs:
              - targets: ['prometheus-blackbox-exporter.monitoring.svc.cluster.local:9115']
        storageSpec: 
         volumeClaimTemplate:
           spec:
             storageClassName: longhorn
             accessModes: ["ReadWriteOnce"]
             resources:
               requests:
                 storage: 256Gi
    prometheus-node-exporter:
      prometheus:
        monitor:
          attachMetadata:
            node: true
          relabelings:
            - action: replace
              sourceLabels:
                - __meta_kubernetes_node_name
              targetLabel: instance
