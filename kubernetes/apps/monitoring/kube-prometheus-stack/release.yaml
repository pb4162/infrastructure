apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 77.6.2
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
      interval: 5m
  releaseName: kube-prometheus-stack
  upgrade:
    crds: CreateReplace
  valuesFrom:
    - kind: Secret
      name: kube-prometheus-stack-values
  values:
    defaultRules:
      rules:
        kubeControllerManager: false
        kubeProxy: false
        kubeSchedulerAlerting: false
        kubeSchedulerRecording: false
    grafana: 
      resources:
        limits:
          memory: 256Mi
      ingress:
        enabled: true
        hosts:
          - grafana.${LOCAL_ROOT_DOMAIN}
          - grafana.${ROOT_DOMAIN}
      persistence:
        enabled: true
        storageClassName: longhorn
    alertmanager:
      config:
        route:
          group_by: ['namespace']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: 'null'
          routes:
          - receiver: 'null'
            matchers:
              - alertname = "Watchdog"
          - receiver: 'discord'
      alertmanagerSpec:
          resources:
            limits:
              memory: 512Mi
          storage: 
            volumeClaimTemplate:
              spec:
                storageClassName: longhorn
                accessModes: ["ReadWriteOnce"]
                resources:
                    requests:
                      storage: 10Gi
    prometheusOperator:
      resources:
        limits:
          memory: 256Mi
    prometheus:
      ingress:
        enabled: true
        annotations:
          traefik.ingress.kubernetes.io/router.middlewares: authentik-authentik@kubernetescrd
        hosts:
          - prometheus.${LOCAL_ROOT_DOMAIN}
          - prometheus.${ROOT_DOMAIN}
      prometheusSpec:
        scrapeInterval: "60s"
        maximumStartupDurationSeconds: 600
        retentionSize: 108GB
        resources:
          limits:
            memory: 4Gi
            cpu: 400m
        storageSpec: 
         volumeClaimTemplate:
           spec:
             storageClassName: longhorn
             accessModes: ["ReadWriteOnce"]
             resources:
               requests:
                 storage: 110Gi
