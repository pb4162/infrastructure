apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pve-exporter
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: pve-exporter
  namespaceSelector:
    matchNames:
      - monitoring
  endpoints:
  - port: metrics
    scrapeTimeout: 20s
    path: /pve
    params:
      target:
        - ${PROXMOX_URL}
      cluster:
        - "1"
      node:
        - "1"
