apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: speedtest-exporter
  namespace: monitoring
spec:
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 5m
  releaseName: speedtest-exporter
  values:
    controllers:
      main:
        type: statefulset
        containers:
          main:
            image:
              repository: miguelndecarvalho/speedtest-exporter
              tag: v3.5.4
    service:
      main:
        controller: main
        labels:
          app: speedtest-exporter
        ports:
          metrics:
            port: 9798
            protocol: TCP
