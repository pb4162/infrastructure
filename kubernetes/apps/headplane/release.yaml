apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headplane
  namespace: headplane
spec:
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 5m
  releaseName: headplane
  values:
    controllers:
      main:
        enabled: true
        containers:
          main:
            image:
              repository: ghcr.io/tale/headplane
              tag: 0.6.3
    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            enabled: true
            port: 3000
    ingress:
      main:
        enabled: true
        annotations:
          traefik.ingress.kubernetes.io/router.middlewares: headplane-headplane-admin-redirect@kubernetescrd
        hosts:
          - host: headplane.${LOCAL_ROOT_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  name: headplane
                  port: 3000
          - host: headplane.${ROOT_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  name: headplane
                  port: 3000
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 2Gi
        globalMounts:
          - path: /var/lib/headplane
            readOnly: false
      config:
        enabled: true
        type: secret
        name: headplane-config
        globalMounts:
          - subPath: config.yaml
            path: /etc/headplane/config.yaml
