apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg-gitea
  namespace: gitea
spec:
  chart:
    spec:
      chart: cluster
      version: 0.6.0
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: cnpg-system
      interval: 5m
  releaseName: cnpg-gitea
  valuesFrom:
    - kind: ConfigMap
      name: cnpg-default-values
    - kind: Secret
      name: cnpg-backup-values
  values:
    version:
      postgresql: "17"
    cluster:
      initdb:
        database: gitea
        owner: gitea
        secret:
          name: cnpg-gitea-password
      storage:
        size: 10Gi
      walStorage:
        enabled: true
        size: 2Gi
      postgresql:
        parameters:
          max_slot_wal_keep_size: "1.5GB"
    backups:
      scheduledBackups:
        - name: daily-backup
          schedule: "0 0 0 * * *"
