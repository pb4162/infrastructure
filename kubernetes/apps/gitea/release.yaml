apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea
  namespace: gitea
spec:
  chart:
    spec:
      chart: gitea
      version: 12.2.0
      sourceRef:
        kind: HelmRepository
        name: gitea-charts
      interval: 5m
  releaseName: gitea
  valuesFrom:
    - kind: Secret
      name: gitea-values
  values:
    ingress:
      enabled: true
      hosts:
        # this one must be first for the ROOT_URL to be set properly
        - host: gitea.${ROOT_DOMAIN}
          paths:
            - path: /
        - host: gitea.${LOCAL_ROOT_DOMAIN}
          paths:
            - path: /
    gitea:
      config:
        database:
          DB_TYPE: postgres
          HOST: cnpg-gitea-cluster-rw.gitea.svc.cluster.local:5432
          NAME: gitea
          USER: gitea
      additionalConfigSources:
        - configMap:
            name: gitea-app-ini
    persistence:
      create: true
      mount: true
      size: 50Gi
    redis-cluster:
      enabled: false
    postgresql-ha:
      enabled: false
    postgresql:
      enabled: true
