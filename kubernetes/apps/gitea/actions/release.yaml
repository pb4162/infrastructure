apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea-actions
  namespace: gitea
spec:
  chart:
    spec:
      chart: actions
      version: 0.0.3
      sourceRef:
        kind: HelmRepository
        name: gitea-charts
      interval: 5m
  releaseName: gitea-actions
  values:
    enabled: true
    statefulset:
      actRunner:
        config: |
          container:
            valid_volumes:
            - /var/run/docker.sock
    existingSecret: gitea-actions-secret
    existingSecretKey: REGISTRATION_TOKEN
    giteaRootURL: https://gitea.${ROOT_DOMAIN}
