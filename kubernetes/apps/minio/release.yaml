apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
  namespace: minio
spec:
  chart:
    spec:
      chart: minio
      version: 5.4.0
      sourceRef:
        kind: HelmRepository
        name: minio
      interval: 5m
  releaseName: minio
  valuesFrom:
    - kind: Secret
      name: minio-values
  values:
    mode: standalone
    persistence:
      storageClass: "longhorn"
      size: 120Gi
    consoleIngress:
      enabled: true
      hosts:
        - minio.${LOCAL_ROOT_DOMAIN}
        - minio.${ROOT_DOMAIN}
    resources:
      requests:
        memory: 64Mi
    metrics:
      serviceMonitor:
        enabled: true
        # additionalLabels:
        #   release: kube-prometheus-stack
