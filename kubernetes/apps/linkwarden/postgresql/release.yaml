apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgresql
  namespace: linkwarden
spec:
  chart:
    spec:
      chart: postgresql
      version: 16.6.3
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 5m
  releaseName: postgresql
  valuesFrom:
    - kind: Secret
      name: postgresql-values
