apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ntfy
  namespace: ntfy
spec:
  chart:
    spec:
      chart: app-template
      version: 4.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 5m
  releaseName: ntfy
  values:
    controllers:
      main:
        enabled: true
        containers:
          main:
            image:
              repository: binwiederhier/ntfy
              tag: v2.12
            args:
              - "serve"
    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            enabled: true
            port: 80
    ingress:
      main:
        enabled: true
        hosts:
          - host: ntfy.${LOCAL_ROOT_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  name: ntfy
                  port: 80
          - host: ntfy.${ROOT_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  name: ntfy
                  port: 80
    persistence:
      config:
        enabled: true
        type: secret
        name: ntfy-secret
        globalMounts:
          - path: /etc/ntfy
      cache:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        retain: true
        globalMounts:
          - path: /var/cache/ntfy
            readOnly: false
      var-lib:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        retain: true
        globalMounts:
          - path: /var/lib/ntfy
            readOnly: false
