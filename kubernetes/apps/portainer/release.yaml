apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: portainer
  namespace: portainer
spec:
  chart:
    spec:
      chart: portainer
      version: 2.33.1
      sourceRef:
        kind: HelmRepository
        name: portainer
      interval: 5m
  releaseName: portainer
  values:
    trusted_origins:
      enabled: true
      domains: "portainer.${LOCAL_ROOT_DOMAIN},portainer.${ROOT_DOMAIN}"
    resources:
      limits:
        memory: 512Mi
    ingress:
      enabled: true
      hosts:
        - host: portainer.${LOCAL_ROOT_DOMAIN}
          paths:
            - path: /
        - host: portainer.${ROOT_DOMAIN}
          paths:
            - path: /
