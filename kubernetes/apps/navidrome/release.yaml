apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: navidrome
  namespace: navidrome
spec:
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 5m
  releaseName: navidrome
  values:
    controllers:
      main:
        enabled: true
        containers:
          main:
            image:
              repository: deluan/navidrome
              tag: 0.61.1
            env:
              ND_SESSIONTIMEOUT: 24h
    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            enabled: true
            port: 4533
    ingress:
      main:
        enabled: true
        hosts:
          - host: navidrome.${LOCAL_ROOT_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  name: navidrome
                  port: 4533
          - host: navidrome.${ROOT_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  name: navidrome
                  port: 4533
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        globalMounts:
          - path: /data
            readOnly: false
      music:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: jellyfin-media-smb
        globalMounts:
          - path: /music
            readOnly: true
            subPath: Music
